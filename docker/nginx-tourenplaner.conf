# CORS-Proxy fuer den Tourenplaner-Stack: ein Host-Port (5010), zwei Backends.
#   /osrm/...  -> OSRM   (Route/Matrix),  z. B. /osrm/table/v1/driving/...
#   /vroom/    -> VROOM  (Optimierung),   POST mit JSON-Problem
# Die CORS-Header braucht der Browser-Fetch aus der App (Dev: localhost:3001).
server {
  listen 80;
  client_max_body_size 25m;

  location = / {
    add_header Content-Type text/plain;
    return 200 'bw-tourenplaner ok';
  }

  location /osrm/ {
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type' always;
    if ($request_method = 'OPTIONS') { return 204; }
    proxy_pass http://osrm:5000/;
    proxy_read_timeout 300s;
  }

  location /vroom/ {
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type' always;
    if ($request_method = 'OPTIONS') { return 204; }
    proxy_pass http://vroom:3000/;
    proxy_read_timeout 300s;
  }
}
