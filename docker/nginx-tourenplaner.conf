# CORS-Proxy fuer den Tourenplaner-Stack: ein Host-Port (5010), zwei Backends.
#   /osrm/...  -> OSRM   (Route/Matrix),  z. B. /osrm/table/v1/driving/...
#   /vroom/    -> VROOM  (Optimierung),   POST mit JSON-Problem
# Die CORS-Header braucht der Browser-Fetch aus der App (Dev: localhost:3001).
server {
  listen 80;
  client_max_body_size 25m;

  location = / {
    add_header Content-Type text/plain;
    return 200 'bw-tourenplaner ok';
  }

  # Access-Control-Allow-Private-Network: Chrome verlangt dies (Private Network Access),
  # wenn eine oeffentliche HTTPS-Seite (z. B. baumbewaesserung.web.app) auf localhost zugreift.
  # OSRM und vroom-express senden SELBST Access-Control-Allow-*-Header → die Upstream-Header
  # verstecken, sonst doppelte Werte (Chrome blockt "multiple values"). Unsere eigenen gelten.
  # Access-Control-Allow-Private-Network: Chrome verlangt dies (Private Network Access),
  # wenn eine oeffentliche HTTPS-Seite (z. B. baumbewaesserung.web.app) auf localhost zugreift.
  location /osrm/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type' always;
    add_header Access-Control-Allow-Private-Network 'true' always;
    if ($request_method = 'OPTIONS') { return 204; }
    proxy_pass http://osrm:5000/;
    proxy_read_timeout 300s;
  }

  location /vroom/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type' always;
    add_header Access-Control-Allow-Private-Network 'true' always;
    if ($request_method = 'OPTIONS') { return 204; }
    proxy_pass http://vroom:3000/;
    proxy_read_timeout 300s;
  }
}
