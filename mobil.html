<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baumbewässerung — Fahrer</title>
<!-- Preconnect to external servers for faster loading -->
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://tile.openstreetmap.org">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- PWA manifest + theme -->
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232d6a4f' rx='20'/><text y='.9em' font-size='80' x='10'>🌳</text></svg>">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- System font stack instead of Google Fonts (no external request) -->
<style>
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--border:#ddd9d0;
  --text:#1a1917;--text2:#6b6760;--text3:#9c9890;
  --green:#2d6a4f;--green-light:#e8f5ee;--green-mid:#52b788;
  --amber:#b45309;--amber-light:#fef3c7;
  --red:#991b1b;--red-light:#fee2e2;
  --blue:#1e40af;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.12);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}

/* ── SCREENS ─────────────────────────────── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);}
.screen.active{display:flex;}

/* ── LOGIN ───────────────────────────────── */
#screen-login{align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-md);width:100%;max-width:380px;padding:28px 24px;}
.login-brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:6px;}
.form-control{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.form-control:focus{border-color:var(--green-mid);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--radius-sm);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s;width:100%;}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:active{background:#235a42;}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border);}
.btn-success{background:#16a34a;color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-warn{background:var(--amber);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;}

/* ── MAIN APP ─────────────────────────────── */
#screen-app{flex-direction:column;}

/* Header */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100;}
.header-tour{flex:1;min-width:0;}
.header-tour-name{font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-driver{font-size:11px;color:var(--text3);}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}

/* Tab bar */
.tab-bar{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-bottom);}
.tab-btn{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;transition:color .15s;}
.tab-btn.active{color:var(--green);}
.tab-btn svg{width:22px;height:22px;}

/* Content area */
.tab-content{flex:1;overflow:hidden;display:none;flex-direction:column;}
.tab-content.active{display:flex;}

/* ── MAP TAB ──────────────────────────────── */
#map{flex:1;width:100%;}
.map-overlay-top{position:absolute;top:8px;left:8px;right:8px;z-index:1000;pointer-events:none;display:flex;gap:6px;}
.map-overlay-top>*{pointer-events:all;}
.map-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:500;color:var(--text2);box-shadow:var(--shadow);white-space:nowrap;}
.map-pill.active{background:var(--green-light);color:var(--green);}
.recalc-btn{background:var(--green);color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;box-shadow:var(--shadow-md);white-space:nowrap;}
.next-btn{position:absolute;bottom:16px;left:16px;right:16px;z-index:1000;padding:14px;font-size:15px;}

/* ── LIST TAB ─────────────────────────────── */
.list-header{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.list-search{position:relative;}
.list-search input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);outline:none;}
.list-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);}
.tree-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tree-row{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--surface);transition:background .1s;}
.tree-row:active{background:var(--surface2);}
.tree-row.done{opacity:.6;}
.tree-row-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'SF Mono','Fira Code',Consolas,monospace;}
.tree-row-info{flex:1;min-width:0;}
.tree-row-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tree-row-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.status-dot.bewaessert{background:#16a34a;}
.status-dot.nicht{background:var(--red);}
.status-dot.offen{background:var(--border);}

/* ── BAUM DETAIL SHEET ───────────────────── */
#sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;display:none;}
#sheet-backdrop.open{display:block;}
#detail-sheet{position:fixed;left:0;right:0;bottom:0;z-index:2001;background:var(--surface);border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
#detail-sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.sheet-header{padding:14px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sheet-title{font-size:17px;font-weight:700;}
.sheet-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:16px 20px;}
.sheet-footer{padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;}

/* Field display */
.field-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.field-row:last-child{border-bottom:none;}
.field-key{color:var(--text2);}
.field-val{font-weight:500;text-align:right;max-width:60%;}

/* Sections */
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin:16px 0 8px;}

/* Status buttons */
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.status-btn{padding:14px;border-radius:var(--radius-sm);border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;background:var(--surface2);}
.status-btn.selected-ok{background:var(--green-light);border-color:var(--green);color:var(--green);}
.status-btn.selected-nok{background:var(--red-light);border-color:var(--red);color:var(--red);}

/* Reason chips */
.reason-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.reason-chip{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;}
.reason-chip.selected{background:var(--red-light);border-color:var(--red);color:var(--red);}

/* Properties form in sheet */
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.prop-group{display:flex;flex-direction:column;gap:4px;}
.prop-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);}
.prop-input{padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);outline:none;width:100%;}
.prop-input:focus{border-color:var(--green-mid);}
.prop-full{grid-column:1/-1;}

/* Notification */
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:16px;right:16px;background:var(--text);color:var(--bg);padding:12px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:opacity .2s;text-align:center;}
.toast.show{opacity:1;}

/* Spinner */
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Finish tab highlight */
#tab-btn-finish{color:#991b1b !important;}
#tab-btn-finish svg{stroke:#991b1b;}
/* GPS marker */
.gps-dot{width:16px;height:16px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 3px rgba(59,130,246,.3);}
</style>
</head>
<body>

<!-- LOGIN -->
<!-- INSTANT LOADING SCREEN (shows immediately, replaced by login) -->
<div id="screen-loading" style="position:fixed;inset:0;background:#f5f3ee;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2d6a4f" stroke-width="1.5" style="margin-bottom:16px;"><path d="M12 22V12"/><path d="M12 12C12 12 7 9 7 5a5 5 0 0 1 10 0c0 4-5 7-5 7z"/></svg>
  <div style="font-size:18px;font-weight:600;color:#2d6a4f;margin-bottom:8px;">Baumbewässerung</div>
  <div style="font-size:13px;color:#9c9890;margin-bottom:24px;">Fahrer-App</div>
  <div style="width:40px;height:40px;border:3px solid #e8f5ee;border-top-color:#2d6a4f;border-radius:50%;animation:spin .8s linear infinite;"></div>
  <div style="font-size:12px;color:#9c9890;margin-top:16px;" id="loading-status">Verbinde…</div>
</div>
<div class="screen active" id="screen-login">
  <div class="login-card">
    <div class="login-brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22V12"/><path d="M12 12C12 12 7 9 7 5a5 5 0 0 1 10 0c0 4-5 7-5 7z"/></svg>
      Baumbewässerung
    </div>
    <div class="login-sub">Fahrer-App</div>
    <div class="form-group">
      <label class="form-label">Projekt</label>
      <select class="form-control" id="login-project">
        <option value="">Wird geladen…</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Deine Tour</label>
      <select class="form-control" id="login-tour">
        <option value="">– Projekt wählen –</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Dein Name</label>
      <select class="form-control" id="login-name">
        <option value="">– Tour wählen –</option>
      </select>
      <div id="login-name-hint" style="font-size:11px;color:var(--text3);margin-top:4px;display:none;">Kein Fahrer hinterlegt — bitte im Desktop Verwaltung einrichten.</div>
    </div>
    <div id="login-error" style="color:var(--red);font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Tour starten
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div class="screen" id="screen-app">
  <!-- Header -->
  <div class="app-header">
    <div style="width:36px;height:36px;border-radius:10px;background:var(--green-light);display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M12 22V12"/><path d="M12 12C12 12 7 9 7 5a5 5 0 0 1 10 0c0 4-5 7-5 7z"/></svg>
    </div>
    <div class="header-tour">
      <div class="header-tour-name" id="header-tour-name">–</div>
      <div class="header-driver" id="header-driver">–</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="header-count" style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;"></div>
    <button class="btn btn-secondary btn-sm" onclick="doLogout()" style="padding:6px 10px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <!-- Map tab -->
  <div class="tab-content active" id="tab-map" style="position:relative;">
    <div id="map"></div>
    <div class="map-overlay-top">
      <div class="map-pill" id="map-status">Karte lädt…</div>
      <button class="recalc-btn" onclick="recalcFromGPS()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:4px;"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        Route neu
      </button>
    </div>
    <!-- Elegant floating bottom bar on map -->
    <div id="map-bottom-bar" style="position:absolute;bottom:16px;left:12px;right:12px;z-index:1000;display:flex;gap:8px;align-items:flex-end;">
      <!-- Progress pill -->
      <div id="map-progress-pill" style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;box-shadow:var(--shadow-md);flex:1;display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="goToNextTree()">
        <div style="flex:1;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:3px;">Nächster Baum</div>
          <div id="next-tree-name" style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">–</div>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- List tab -->
  <div class="tab-content" id="tab-list">
    <div class="list-header">
      <div class="list-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Baum suchen…" oninput="renderList(this.value)" id="list-search-input">
      </div>
    </div>
    <div class="tree-list" id="tree-list-mobile"></div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-map" onclick="switchTab('map')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
      Karte
    </button>
    <button class="tab-btn" id="tab-btn-list" onclick="switchTab('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Liste
    </button>
    <button class="tab-btn" id="tab-btn-finish" onclick="showFinishConfirm()" style="color:var(--red-text,#991b1b);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Abschließen
    </button>
  </div>
</div>

<!-- TOUR FINISH SHEET -->
<div id="finish-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;" onclick="closeFinishSheet()"></div>
<div id="finish-sheet" style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:3001;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 24px calc(24px + var(--safe-bottom));">
  <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;"></div>
  <div id="finish-content"></div>
</div>

<!-- DETAIL SHEET -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">–</div>
    <div class="sheet-meta" id="sheet-meta">–</div>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-footer" id="sheet-footer"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, addDoc, setDoc,
         onSnapshot, serverTimestamp, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBShCcASfAG26EDyax6er6SIiqeSBrFWek",
  authDomain: "baumbewaesserung.firebaseapp.com",
  projectId: "baumbewaesserung",
  storageBucket: "baumbewaesserung.firebasestorage.app",
  messagingSenderId: "1001991004222",
  appId: "1:1001991004222:web:1405d80d0788bd6548f16f"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ─── STATE ────────────────────────────────────────────────────
let currentDriver = null;
let currentProjectId = null;
let currentTourId = null;
let currentTour = null;
let trees = [];
let routeOrder = []; // ordered tree ids
let reasons = [];    // not-watered reasons from Firestore
let selectedTreeId = null;
let currentTab = 'map';
let gpsMarker = null;
let gpsLatLng = null;
let mapMarkers = {};
let routeLayer = null;

// ─── MAP ──────────────────────────────────────────────────────
const map = L.map('map', {zoomControl: false}).setView([51.05, 13.73], 14);
// Use OpenStreetMap via faster CDN with aggressive caching
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OSM</a>',
  maxZoom: 19,
  maxNativeZoom: 18,
  keepBuffer: 8,
  updateWhenZooming: false,
  updateWhenIdle: false,
  crossOrigin: true,
}).addTo(map);
L.control.zoom({position: 'bottomright'}).addTo(map);

// GPS tracking
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    gpsLatLng = [pos.coords.latitude, pos.coords.longitude];
    if (!gpsMarker) {
      const icon = L.divIcon({
        className: '',
        html: '<div class="gps-dot"></div>',
        iconSize: [16, 16], iconAnchor: [8, 8]
      });
      gpsMarker = L.marker(gpsLatLng, {icon, zIndexOffset: 2000}).addTo(map);
    } else {
      gpsMarker.setLatLng(gpsLatLng);
    }
    document.getElementById('map-status').textContent =
      `GPS: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  }, err => {
    document.getElementById('map-status').textContent = 'GPS nicht verfügbar';
  }, {enableHighAccuracy: true, maximumAge: 5000});
}

async function doLogin() {
  const name = document.getElementById('login-name').value;
  const pid = document.getElementById('login-project').value;
  const tid = document.getElementById('login-tour').value;
  const errEl = document.getElementById('login-error');
  if (!name) { errEl.textContent = 'Bitte Fahrer auswählen.'; errEl.style.display = 'block'; return; }
  if (!pid) { errEl.textContent = 'Bitte Projekt wählen.'; errEl.style.display = 'block'; return; }
  if (!tid) { errEl.textContent = 'Bitte Tour wählen.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  currentDriver = name;
  currentProjectId = pid;
  currentTourId = tid;

  // Load tour
  const tourSnap = await getDoc(doc(db, 'projects', pid, 'tours', tid));
  currentTour = {id: tid, ...tourSnap.data()};

  // Load reasons
  await loadReasons();

  // Load trees
  await loadTrees();

  // Load saved route order
  try {
    const routeSnap = await getDoc(doc(db, 'projects', pid, 'routes', tid));
    if (routeSnap.exists() && routeSnap.data().orderIds) {
      routeOrder = routeSnap.data().orderIds.filter(id => trees.find(t => t.id === id));
      // Add any trees not in route
      trees.forEach(t => { if (!routeOrder.includes(t.id)) routeOrder.push(t.id); });
    } else {
      routeOrder = trees.map(t => t.id);
    }
  } catch(e) { routeOrder = trees.map(t => t.id); }

  // Save session for auto-resume
  localStorage.setItem('bwt_mobile_session', JSON.stringify({
    driver: name, projectId: pid, tourId: tid, savedAt: Date.now()
  }));

  // Show app
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');

  document.getElementById('header-tour-name').textContent = currentTour.name;
  document.getElementById('header-driver').textContent = `Fahrer: ${name}`;

  renderMarkers();
  renderList('');
  updateProgress();
  // Pre-warm map tiles around project center
  if(trees.length>0){
    const lats=trees.map(t=>t.lat).filter(Boolean);
    const lngs=trees.map(t=>t.lng).filter(Boolean);
    if(lats.length>0){
      const clat=lats.reduce((a,b)=>a+b)/lats.length;
      const clng=lngs.reduce((a,b)=>a+b)/lngs.length;
      map.setView([clat,clng],15);
      setTimeout(()=>map.invalidateSize(),100);
    }
  }
  startGPS();
  drawRoute(); // load saved route from Firestore

  // Fit map to trees
  if (trees.length > 0) {
    const bounds = L.latLngBounds(trees.filter(t=>t.lat&&t.lng).map(t=>[t.lat,t.lng]));
    if (bounds.isValid()) map.fitBounds(bounds, {padding:[40,40]});
  }

  // Live updates
  onSnapshot(collection(db,'projects',pid,'trees'), snap => {
    trees = snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(t=>t.tourId===tid);
    routeOrder = routeOrder.filter(id=>trees.find(t=>t.id===id));
    trees.forEach(t=>{if(!routeOrder.includes(t.id))routeOrder.push(t.id);});
    renderMarkers();
    renderList(document.getElementById('list-search-input')?.value||'');
    updateProgress();
    if(selectedTreeId) openSheet(selectedTreeId); // refresh if open
  });
}

async function finishTour() {
  try {
    const now = new Date();
    const dateStr = now.toISOString().slice(0,10);
    const tsStr = now.toISOString();

    // ── 1. Save full historical snapshot to Firestore ─────────────
    const snapshot = {
      tourId: currentTourId,
      tourName: currentTour?.name||'',
      tourColor: currentTour?.color||'',
      date: dateStr,
      closedAt: tsStr,
      closedBy: currentDriver,
      trees: trees.map(t=>({
        id: t.id,
        name: t.name||'',
        art: t.art||'',
        baumnr: t.baumnr||'',
        stadtteil: t.stadtteil||'',
        pflanzjahr: t.pflanzjahr||'',
        lat: t.lat||null,
        lng: t.lng||null,
        zustand: t.zustand||'',
        wasser: t.wasser||'',
        lastStatus: t.lastStatus||null,
        lastReason: t.lastReason||null,
        lastNote: t.lastNote||null,
        lastDriver: t.lastDriver||null,
        lastReportAt: t.lastReportAt||null,
      })),
      stats: {
        total: trees.length,
        bewaessert: trees.filter(t=>t.lastStatus==='bewaessert').length,
        nicht: trees.filter(t=>t.lastStatus==='nicht').length,
        offen: trees.filter(t=>!t.lastStatus).length,
      }
    };

    // Save to tourHistory subcollection with date as ID
    const histId = `${dateStr}_${currentTourId}`;
    await setDoc(
      doc(db,'projects',currentProjectId,'tourHistory',histId),
      snapshot
    );

    // Also add entry to each tree's history array
    for(const tree of trees){
      if(!tree.lastStatus) continue;
      const histEntry = {
        date: dateStr,
        tourId: currentTourId,
        tourName: currentTour?.name||'',
        status: tree.lastStatus,
        reason: tree.lastReason||null,
        note: tree.lastNote||null,
        driver: tree.lastDriver||null,
        zustand: tree.zustand||null,
        wasser: tree.wasser||null,
      };
      const history = [...(tree.history||[]), histEntry];
      await updateDoc(
        doc(db,'projects',currentProjectId,'trees',tree.id),
        {history}
      );
    }

    // ── 2. Mark tour as closed ────────────────────────────────────
    await updateDoc(doc(db,'projects',currentProjectId,'tours',currentTourId),{
      status: 'abgeschlossen',
      closedAt: tsStr,
      closedBy: currentDriver,
      lastClosedDate: dateStr,
    });

    currentTour = {...currentTour, status: 'abgeschlossen'};
    closeFinishSheet();
    toast('✅ Tour abgeschlossen & gespeichert');

  } catch(e) { toast('Fehler beim Abschließen: '+e.message); console.error(e); }
}

async function reopenTour() {
  try {
    const now = new Date();

    // Reset ONLY status fields — stammdaten stay intact
    for(const tree of trees) {
      await updateDoc(doc(db,'projects',currentProjectId,'trees',tree.id),{
        lastStatus: null,
        lastReason: null,
        lastNote: null,
        lastReportAt: null,
        lastDriver: null,
        // Stammdaten (name, art, baumnr, lat, lng, zustand, wasser, etc.) preserved
      });
    }

    await updateDoc(doc(db,'projects',currentProjectId,'tours',currentTourId),{
      status: 'aktiv',
      reopenedAt: now.toISOString(),
      reopenedBy: currentDriver,
    });

    currentTour = {...currentTour, status: 'aktiv'};
    closeFinishSheet();
    toast('🔄 Tour neu gestartet — viel Erfolg!');

  } catch(e) { toast('Fehler: '+e.message); }
}

function makeTreeIcon(tree, idx) {
  const status = tree.lastStatus; // 'bewaessert' | 'nicht' | null
  const color = currentTour?.color || '#2d6a4f';
  const bg = status==='bewaessert'?'#16a34a':status==='nicht'?'#991b1b':color;
  const num = idx+1;
  const isNext = routeOrder.indexOf(tree.id) === getNextIdx();
  const size = isNext ? 38 : 30;
  const border = isNext ? '4px solid #fff' : '3px solid #fff';
  const shadow = isNext ? '0 0 0 3px '+color+', 0 4px 12px rgba(0,0,0,.3)' : '0 2px 6px rgba(0,0,0,.3)';
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:${size}px;height:${size}px;">
      <div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};border:${border};box-shadow:${shadow};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:'SF Mono','Fira Code',Consolas,monospace;">${status?status==='bewaessert'?'✓':'✕':num}</div>
    </div>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2]
  });
}

function renderMarkers() {
  Object.values(mapMarkers).forEach(m=>map.removeLayer(m));
  mapMarkers={};
  routeOrder.forEach((id,idx)=>{
    const tree=trees.find(t=>t.id===id);
    if(!tree||!tree.lat||!tree.lng)return;
    const m=L.marker([tree.lat,tree.lng],{icon:makeTreeIcon(tree,idx)})
      .addTo(map).on('click',()=>openSheet(id));
    mapMarkers[id]=m;
  });
  // Route drawn separately via drawRoute() to load from Firestore
}

async function drawRoute(){
  if(routeLayer){
    if(Array.isArray(routeLayer))routeLayer.forEach(l=>map.removeLayer(l));
    else map.removeLayer(routeLayer);
    routeLayer=null;
  }
  if(depotMarker){map.removeLayer(depotMarker);depotMarker=null;}

  const color=currentTour?.color||'#2d6a4f';

  // Load saved route from Firestore (same as desktop)
  try{
    const routeSnap=await getDoc(doc(db,'projects',currentProjectId,'routes',currentTourId));
    if(routeSnap.exists()){
      const data=routeSnap.data();
      // Restore route order from saved data
      if(data.orderIds){
        const savedOrder=data.orderIds.filter(id=>trees.find(t=>t.id===id));
        // Merge: keep done trees in order, append remaining
        const done=routeOrder.filter(id=>trees.find(t=>t.id===id)&&trees.find(t=>t.id===id).lastStatus);
        const remaining=savedOrder.filter(id=>!trees.find(t=>t.id===id)?.lastStatus);
        routeOrder=[...done,...remaining];
        trees.forEach(t=>{if(!routeOrder.includes(t.id))routeOrder.push(t.id);});
      }
      // Draw real street route from saved GeoJSON
      if(data.geojsonStr){
        try{
          const geo=JSON.parse(data.geojsonStr);
          routeLayer=L.geoJSON(geo,{style:{color,weight:4,opacity:.85}}).addTo(map);
          drawDepotMarker(data);
          return;
        }catch(e){}
      }
    }
  }catch(e){}

  // Fallback: dashed polyline with depot if set
  const pts=routeOrder.map(id=>{
    const t=trees.find(x=>x.id===id);
    return t&&t.lat&&t.lng?[t.lat,t.lng]:null;
  }).filter(Boolean);
  if(pts.length<2)return;

  // Add depot to route if configured
  const allPts=await getRouteWithDepot(pts);
  routeLayer=L.polyline(allPts,{color,weight:3,opacity:.7,dashArray:'8 5'}).addTo(map);
  drawDepotMarker(null);
}

let depotMarker=null;

async function getRouteWithDepot(pts){
  try{
    const projSnap=await getDoc(doc(db,'projects',currentProjectId));
    const depot=projSnap.data()?.depot;
    const depotMode=projSnap.data()?.depotMode||'round';
    if(depot?.lat&&depot?.lng){
      const dp=[depot.lat,depot.lng];
      return depotMode==='round'?[dp,...pts,dp]:[dp,...pts];
    }
  }catch(e){}
  return pts;
}

async function drawDepotMarker(routeData){
  if(depotMarker){map.removeLayer(depotMarker);depotMarker=null;}
  try{
    const projSnap=await getDoc(doc(db,'projects',currentProjectId));
    const depot=projSnap.data()?.depot;
    if(!depot?.lat)return;
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:32px;height:32px;border-radius:8px;background:#f59e0b;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:16px;">🏭</div>`,
      iconSize:[32,32],iconAnchor:[16,16]
    });
    depotMarker=L.marker([depot.lat,depot.lng],{icon,zIndexOffset:1000})
      .addTo(map)
      .bindTooltip(`<b>Betriebshof</b>`,{direction:'top',offset:[0,-18]});
  }catch(e){}
}

// ─── NEXT TREE ─────────────────────────────────────────────────
function getNextIdx(){
  return routeOrder.findIndex(id=>{
    const t=trees.find(x=>x.id===id);
    return t&&!t.lastStatus;
  });
}

function goToNextTree(){
  const idx=getNextIdx();
  if(idx===-1){toast('Alle Bäume abgearbeitet! 🎉');return;}
  const id=routeOrder[idx];
  const tree=trees.find(t=>t.id===id);
  if(tree&&tree.lat&&tree.lng) map.panTo([tree.lat,tree.lng],{animate:true});
  openSheet(id);
}

function recalcFromGPS(){
  if(!gpsLatLng){toast('GPS noch nicht verfügbar');return;}
  // Nearest-neighbor from GPS position
  const remaining=trees.filter(t=>!t.lastStatus&&t.lat&&t.lng);
  if(remaining.length===0){toast('Alle erledigt!');return;}
  const done=trees.filter(t=>t.lastStatus);
  const ordered=nearestNeighbor(remaining,gpsLatLng[0],gpsLatLng[1]);
  routeOrder=[...done.map(t=>t.id),...ordered.map(t=>t.id)];
  renderMarkers();
  renderList('');
  toast('Route neu berechnet');
  drawRoute();
}

function nearestNeighbor(pts,startLat,startLng){
  const visited=new Set();const result=[];
  let lat=startLat,lng=startLng;
  while(result.length<pts.length){
    let best=null,bestD=Infinity;
    for(const p of pts){
      if(visited.has(p.id))continue;
      const d=haversine(lat,lng,p.lat,p.lng);
      if(d<bestD){bestD=d;best=p;}
    }
    if(!best)break;
    result.push(best);visited.add(best.id);lat=best.lat;lng=best.lng;
  }
  return result;
}

function haversine(a,b,c,d){
  const R=6371,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ─── LIST ──────────────────────────────────────────────────────
function renderList(q=''){
  const el=document.getElementById('tree-list-mobile');
  let list=routeOrder.map(id=>trees.find(t=>t.id===id)).filter(Boolean);
  if(q) list=list.filter(t=>(t.name||'').toLowerCase().includes(q.toLowerCase())||(t.art||'').toLowerCase().includes(q.toLowerCase()));
  if(list.length===0){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3);">Keine Bäume</div>';return;}
  el.innerHTML=list.map((tree,i)=>{
    const idx=routeOrder.indexOf(tree.id);
    const st=tree.lastStatus;
    const dotClass=st==='bewaessert'?'bewaessert':st==='nicht'?'nicht':'offen';
    const color=currentTour?.color||'#2d6a4f';
    return `<div class="tree-row${st?' done':''}" data-id="${tree.id}">
      <div class="tree-row-num" style="background:${color}22;color:${color};">${idx+1}</div>
      <div class="tree-row-info">
        <div class="tree-row-name">${tree.name||'–'}</div>
        <div class="tree-row-meta">${tree.art||'–'} · ${tree.stadtteil||''}</div>
      </div>
      <div class="status-dot ${dotClass}"></div>
    </div>`;
  }).join('');
  el.onclick=e=>{
    const row=e.target.closest('[data-id]');
    if(row) openSheet(row.dataset.id);
  };
}

// ─── SHEET ────────────────────────────────────────────────────
function openSheet(id){
  selectedTreeId=id;
  const tree=trees.find(t=>t.id===id);
  if(!tree)return;
  document.getElementById('sheet-title').textContent=tree.name||'–';
  document.getElementById('sheet-meta').textContent=
    `${tree.art||'–'} · ${tree.stadtteil||''} · ${tree.baumnr||''}`;

  const idx=routeOrder.indexOf(id);
  const statusVal=tree.lastStatus||'';
  const reasonVal=tree.lastReason||'';

  // Build reason chips
  const reasonChips=reasons.length>0
    ? reasons.map(r=>`<div class="reason-chip${reasonVal===r.text?' selected':''}" data-reason="${r.text}">${r.text}</div>`).join('')
    : '<div style="font-size:12px;color:var(--text3);padding:4px 0;">Keine Gründe hinterlegt — bitte in der Desktop-App unter Verwaltung einrichten.</div>';

  document.getElementById('sheet-body').innerHTML=`
    <!-- Status -->
    <div class="section-title">Bewässerungsstatus</div>
    <div class="status-btns">
      <div class="status-btn${statusVal==='bewaessert'?' selected-ok':''}" id="btn-ok" onclick="selectStatus('bewaessert')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        Bewässert
      </div>
      <div class="status-btn${statusVal==='nicht'?' selected-nok':''}" id="btn-nok" onclick="selectStatus('nicht')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Nicht bewässert
      </div>
    </div>

    <!-- Reasons (only when nicht) -->
    <div id="reason-section" style="display:${statusVal==='nicht'?'block':'none'}">
      <div class="section-title">Grund</div>
      <div class="reason-chips" id="reason-chips">${reasonChips}</div>
      <input class="prop-input prop-full" id="reason-custom" placeholder="Weitere Bemerkung…" value="${tree.lastNote||''}">
    </div>

    <!-- Properties -->
    <div class="section-title" style="margin-top:16px;">Eigenschaften erfassen</div>
    <div class="prop-grid">
      <div class="prop-group">
        <label class="prop-label">Zustand</label>
        <select class="prop-input" id="p-zustand">
          <option value="gut"${tree.zustand==='gut'?' selected':''}>Gut</option>
          <option value="mittel"${(!tree.zustand||tree.zustand==='mittel')?' selected':''}>Mittel</option>
          <option value="schlecht"${tree.zustand==='schlecht'?' selected':''}>Schlecht</option>
        </select>
      </div>
      <div class="prop-group">
        <label class="prop-label">Wasserbedarf</label>
        <select class="prop-input" id="p-wasser">
          <option value="gering"${tree.wasser==='gering'?' selected':''}>Gering</option>
          <option value="mittel"${(!tree.wasser||tree.wasser==='mittel')?' selected':''}>Mittel</option>
          <option value="hoch"${tree.wasser==='hoch'?' selected':''}>Hoch</option>
        </select>
      </div>
      <div class="prop-group prop-full">
        <label class="prop-label">Bemerkung</label>
        <input class="prop-input" id="p-notiz" placeholder="Freitext…" value="${tree.notiz||''}">
      </div>
    </div>

    <!-- Info fields -->
    <div class="section-title">Stammdaten</div>
    <div class="field-row"><span class="field-key">Baumnr.</span><span class="field-val">${tree.baumnr||'–'}</span></div>
    <div class="field-row"><span class="field-key">Baumart</span><span class="field-val" style="font-style:italic;">${tree.art||'–'}</span></div>
    <div class="field-row"><span class="field-key">Pflanzjahr</span><span class="field-val">${tree.pflanzjahr||'–'}</span></div>
    <div class="field-row"><span class="field-key">Pflanzzeit</span><span class="field-val">${tree.pflanzzeitpunkt||'–'}</span></div>
    <div class="field-row"><span class="field-key">Koordinaten</span><span class="field-val" style="font-size:11px;font-family:monospace;">${tree.lat?tree.lat.toFixed(5)+', '+tree.lng.toFixed(5):'–'}</span></div>
    <div class="field-row"><span class="field-key">Route #</span><span class="field-val">#${idx+1}</span></div>
    ${tree.lastStatus?`<div class="field-row"><span class="field-key">Letzte Meldung</span><span class="field-val">${tree.lastStatus==='bewaessert'?'✓ Bewässert':'✕ Nicht bewässert'}</span></div>`:''}
  `;

  // Reason chips click
  document.getElementById('reason-chips').onclick=e=>{
    const chip=e.target.closest('[data-reason]');
    if(!chip)return;
    document.querySelectorAll('.reason-chip').forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
  };

  document.getElementById('sheet-footer').innerHTML=`
    <button class="btn btn-secondary" style="flex:1;" onclick="closeSheet()">Abbrechen</button>
    <button class="btn btn-primary" style="flex:2;" onclick="saveReport('${id}')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      Speichern & weiter
    </button>
  `;

  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');

  // Pan map to tree
  if(tree.lat&&tree.lng&&currentTab==='map')
    map.panTo([tree.lat,tree.lng],{animate:true});
}

let _sheetStatus=null;
function selectStatus(s){
  _sheetStatus=s;
  document.getElementById('btn-ok').className='status-btn'+(s==='bewaessert'?' selected-ok':'');
  document.getElementById('btn-nok').className='status-btn'+(s==='nicht'?' selected-nok':'');
  document.getElementById('reason-section').style.display=s==='nicht'?'block':'none';
}

function closeSheet(){
  _sheetStatus=null;
  selectedTreeId=null;
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
}

async function saveReport(id){
  const tree=trees.find(t=>t.id===id);if(!tree)return;
  const status=_sheetStatus||tree.lastStatus;
  const selectedChip=document.querySelector('.reason-chip.selected');
  const reason=selectedChip?selectedChip.dataset.reason:'';
  const note=document.getElementById('reason-custom')?.value||'';
  const zustand=document.getElementById('p-zustand')?.value||tree.zustand;
  const wasser=document.getElementById('p-wasser')?.value||tree.wasser;
  const notiz=document.getElementById('p-notiz')?.value||tree.notiz||'';

  const updates={
    zustand,wasser,notiz,
    lastStatus:status||null,
    lastReason:reason||null,
    lastNote:note||null,
    lastDriver:currentDriver,
    lastReportAt:new Date().toISOString(),
  };
  if(status==='bewaessert') updates.datum=new Date().toISOString().slice(0,10);

  try{
    await updateDoc(doc(db,'projects',currentProjectId,'trees',id),updates);
    // Log to history
    const history=[...(tree.history||[]),{
      date:new Date().toISOString().slice(0,10),
      note:`${status==='bewaessert'?'Bewässert':'Nicht bewässert'}${reason?' — '+reason:''}${note?' ('+note+')':''}`,
      driver:currentDriver
    }];
    await updateDoc(doc(db,'projects',currentProjectId,'trees',id),{history});
    closeSheet();
    toast(status==='bewaessert'?'✓ Bewässert gemeldet':'✕ Nicht bewässert gemeldet');
    // Auto-advance to next
    setTimeout(()=>{
      const nextIdx=getNextIdx();
      if(nextIdx!==-1){
        const nextId=routeOrder[nextIdx];
        const next=trees.find(t=>t.id===nextId);
        if(next&&next.lat&&next.lng) map.panTo([next.lat,next.lng],{animate:true,duration:0.8});
      }
    },800);
  }catch(e){toast('Fehler: '+e.message);}
}

// ─── TABS ─────────────────────────────────────────────────────
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('tab-btn-'+t).classList.add('active');
  if(t==='map') setTimeout(()=>map.invalidateSize(),50);
}

// ─── TOAST ────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ─── GLOBALS ──────────────────────────────────────────────────
Object.assign(window,{
  doLogin,doLogout,switchTab,openSheet,closeSheet,
  selectStatus,saveReport,goToNextTree,recalcFromGPS,
  renderList,toast,showFinishConfirm,closeFinishSheet,finishTour,reopenTour
});

// ── SESSION RESUME ───────────────────────────────────────────
// Try to restore last session so driver doesn't have to log in every time
async function tryResumeSession() {
  const saved = localStorage.getItem('bwt_mobile_session');
  if(!saved) { loadProjects(); return; }
  try {
    const session = JSON.parse(saved);
    const {driver, projectId, tourId, savedAt} = session;
    // Session valid for 12 hours
    if(Date.now() - savedAt > 12*3600*1000) { localStorage.removeItem('bwt_mobile_session'); loadProjects(); return; }
    setLoadingStatus(`Willkommen zurück, ${driver}!`);
    // Pre-fill login form
    document.getElementById('login-name').value = driver;
    // Load project list
    await loadProjects();
    // Auto-select project, tour, and driver
    const projSel = document.getElementById('login-project');
    projSel.value = projectId;
    await projSel.dispatchEvent(new Event('change'));
    setTimeout(()=>{
      const tourSel = document.getElementById('login-tour');
      tourSel.value = tourId;
      tourSel.dispatchEvent(new Event('change'));
      setTimeout(()=>{
        const nameSel = document.getElementById('login-name');
        if(nameSel) nameSel.value = driver;
      }, 400);
    }, 600);
    // Show resume banner
    const card = document.querySelector('.login-card');
    if(card) {
      const banner = document.createElement('div');
      banner.style.cssText = 'background:var(--green-light);border:1px solid var(--green-mid);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--green);display:flex;align-items:center;gap:8px;';
      banner.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>Letzte Session: ${driver} — Tour wird fortgesetzt`;
      card.insertBefore(banner, card.firstChild);
    }
  } catch(e) { loadProjects(); }
}

// Init
tryResumeSession();
</script>
<script>
// Register Service Worker for offline tile caching
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='bwt-tiles-v1';
const TILE_RE=/tile\.openstreetmap\.org/;
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>self.clients.claim());
self.addEventListener('fetch',e=>{
  if(!TILE_RE.test(e.request.url))return;
  e.respondWith(
    caches.open(CACHE).then(async cache=>{
      const cached=await cache.match(e.request);
      if(cached)return cached;
      try{
        const res=await fetch(e.request);
        if(res.ok)cache.put(e.request,res.clone());
        return res;
      }catch(err){
        return cached||new Response('',{status:503});
      }
    })
  );
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
